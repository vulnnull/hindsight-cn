name: 同步上游代码

on:
  schedule:
    # 北京时间每天 06:00 / 18:00 自动检查上游更新（UTC 22:00 / 10:00）
    - cron: "0 22 */1 * *"
    - cron: "0 10 */1 * *"
  workflow_dispatch: # 允许手动触发

permissions:
  contents: write
  pull-requests: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: 检出本仓库
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: main

      - name: 添加上游仓库
        run: |
          git remote add upstream https://github.com/vectorize-io/hindsight.git
          git fetch upstream

      - name: 检查上游更新
        id: check
        run: |
          BEHIND=$(git rev-list --count HEAD..upstream/main 2>/dev/null || echo 0)
          echo "behind=$BEHIND" >> $GITHUB_OUTPUT
          echo "落后上游 $BEHIND 个提交"

      - name: 合并上游变更
        if: steps.check.outputs.behind > 0
        id: merge
        env:
          CP_PREFIX: "hindsight-control-plane/"
        run: |
          git config user.name "hindsight-cn bot"
          git config user.email "bot@hindsight-cn.local"

          # 保存合并前的 HEAD（用于恢复工作流文件）
          PRE_MERGE_HEAD=$(git rev-parse HEAD)

          # 使用策略式合并：控制面板文件优先上游版本（i18n），其他保留本地版本
          set +e
          git merge upstream/main --no-commit -X ours
          MERGE_EXIT=$?
          set -e

          if [ $MERGE_EXIT -ne 0 ]; then
            echo "存在树级冲突，逐文件解决..."

            CONFLICTS=$(git diff --name-only --diff-filter=U 2>/dev/null || true)
            CONFLICT_COUNT=$(echo "$CONFLICTS" | grep -c . 2>/dev/null || echo 0)
            echo "冲突文件数：$CONFLICT_COUNT"

            while IFS= read -r file; do
              [ -z "$file" ] && continue

              if [[ "$file" == "$CP_PREFIX"* ]]; then
                echo "  [上游] $file"
                if git show "upstream/main:$file" > /dev/null 2>&1; then
                  git checkout --theirs -- "$file" 2>/dev/null || true
                else
                  git rm --force "$file" 2>/dev/null || true
                fi
              else
                echo "  [本地] $file"
                if [ -e "$file" ]; then
                  git checkout --ours -- "$file" 2>/dev/null || true
                else
                  git rm --force "$file" 2>/dev/null || true
                fi
              fi
              git add --force "$file" 2>/dev/null || true
            done <<< "$CONFLICTS"
          fi

          # 恢复 .github/workflows/ 到合并前的版本
          # GITHUB_TOKEN 没有 workflows 权限，不能推送工作流文件变更
          git checkout "$PRE_MERGE_HEAD" -- .github/workflows/ 2>/dev/null || true
          git add .github/workflows/

          # 提交合并结果
          if ! git diff --cached --quiet 2>/dev/null; then
            git commit --no-edit
            echo "合并完成"
            echo "merged=true" >> $GITHUB_OUTPUT
          else
            echo "无实际变更需要提交"
            echo "merged=false" >> $GITHUB_OUTPUT
          fi

      - name: 推送到本仓库
        if: steps.check.outputs.behind > 0 && steps.merge.outputs.merged == 'true'
        run: git push origin main
