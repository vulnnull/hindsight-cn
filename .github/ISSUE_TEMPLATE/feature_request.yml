name: 功能请求
description: 建议新功能或改进
labels: ["enhancement", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        感谢你的建议！请描述你希望添加的功能。

  - type: textarea
    id: use-case
    attributes:
      label: 使用场景
      description: 描述你的具体使用场景，你在构建什么？目标是什么？
      placeholder: |
        我在构建一个 AI 智能体，需要...
        我的应用需要处理...
    validations:
      required: true

  - type: textarea
    id: problem
    attributes:
      label: 当前痛点
      description: 你面临什么问题？目前缺少什么或哪里不好用？
      placeholder: 目前我不得不...这导致了...
    validations:
      required: true

  - type: textarea
    id: benefit
    attributes:
      label: 功能价值
      description: 这个功能如何改善你的工作流或解决问题？
      placeholder: 有了这个功能，我就可以...
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: 建议方案
      description: 描述你理想的解决方案（可选，我们也许有其他想法！）
      placeholder: 如果 Hindsight 能...就太好了
    validations:
      required: false

  - type: textarea
    id: alternatives
    attributes:
      label: 考虑过的替代方案
      description: 你是否考虑过其他替代方案或临时解决方案？
    validations:
      required: false

  - type: dropdown
    id: priority
    attributes:
      label: 优先级
      description: 这个功能对你有多重要？
      options:
        - 有了更好
        - 重要 — 影响工作流
        - 关键 — 阻塞使用
    validations:
      required: true

  - type: textarea
    id: additional
    attributes:
      label: 补充信息
      description: 还有其他上下文、截图或示例吗？
    validations:
      required: false

  - type: checkboxes
    id: checklist
    attributes:
      label: 检查清单
      options:
        - label: 我愿意贡献代码实现此功能
          required: false
